version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: km0_postgis
    environment:
      POSTGRES_USER: km0_user
      POSTGRES_PASSWORD: km0_password
      POSTGRES_DB: km0_db
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
